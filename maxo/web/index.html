<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ank — AI Voice Assistant powered by LiveKit and Gemini">
    <meta name="theme-color" content="#0a0a1a">
    <title>Ank — Voice Assistant</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/maxo_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/maxo_icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Background particles canvas -->
    <canvas id="particles-canvas"></canvas>

    <!-- Top status bar -->
    <header class="status-bar">
        <div class="status-left">
            <div class="logo-mark">
                <span class="logo-icon">◆</span>
                <span class="logo-text">ANK</span>
            </div>
            <div class="status-pill" id="connection-status">
                <span class="status-dot"></span>
                <span class="status-label">OFFLINE</span>
            </div>
        </div>
        <div class="status-right">
            <div class="status-pill agent-pill" id="agent-status">
                <span class="status-dot"></span>
                <span class="status-label">AGENT: —</span>
            </div>
            <div class="clock" id="clock">00:00:00</div>
            <!-- Settings gear -->
            <button class="settings-btn" id="btn-settings" onclick="toggleSettings()" title="Settings">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
                    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Settings Panel (slide-out) -->
    <div class="settings-overlay" id="settings-overlay" onclick="toggleSettings()"></div>
    <aside class="settings-panel" id="settings-panel">
        <div class="settings-header">
            <h2 class="settings-title">⚙ SETTINGS</h2>
            <button class="settings-close" onclick="toggleSettings()">✕</button>
        </div>

        <div class="settings-body">
            <!-- Voice Selection -->
            <div class="setting-group">
                <label class="setting-label">
                    <span class="setting-icon">🎙</span> Agent Voice
                </label>
                <select class="setting-select" id="voice-select">
                    <option value="Charon">Charon (Deep, Confident)</option>
                    <option value="Puck">Puck (Energetic, Playful)</option>
                    <option value="Kore">Kore (Calm, Warm)</option>
                    <option value="Fenrir">Fenrir (Bold, Strong)</option>
                    <option value="Aoede">Aoede (Soft, Musical)</option>
                    <option value="Leda">Leda (Clear, Professional)</option>
                    <option value="Orus">Orus (Rich, Baritone)</option>
                    <option value="Zephyr">Zephyr (Light, Breezy)</option>
                </select>
                <p class="setting-hint">Changes take effect on agent restart.</p>
            </div>

            <!-- MCP Servers -->
            <div class="setting-group">
                <label class="setting-label">
                    <span class="setting-icon">🔗</span> MCP Servers
                </label>
                <div class="mcp-list" id="mcp-list">
                    <div class="mcp-empty" id="mcp-empty">No MCP servers configured.</div>
                </div>
                <div class="mcp-add-form">
                    <input class="setting-input" id="mcp-name" placeholder="Server name" />
                    <input class="setting-input" id="mcp-url" placeholder="Server URL (e.g. http://localhost:8080/sse)" />
                    <select class="setting-select setting-select-sm" id="mcp-type">
                        <option value="sse">SSE</option>
                        <option value="stdio">STDIO</option>
                    </select>
                    <button class="btn-add-mcp" onclick="addMcpServer()">+ Add Server</button>
                </div>
            </div>

            <!-- System Health -->
            <div class="setting-group">
                <label class="setting-label">
                    <span class="setting-icon">💚</span> System Health
                </label>
                <div class="health-grid">
                    <div class="health-item">
                        <span class="health-dot online" id="health-server"></span>
                        <span>Web Server</span>
                    </div>
                    <div class="health-item">
                        <span class="health-dot" id="health-agent"></span>
                        <span>Agent</span>
                    </div>
                    <div class="health-item">
                        <span class="health-dot" id="health-livekit"></span>
                        <span>LiveKit Cloud</span>
                    </div>
                    <div class="health-item">
                        <span class="health-dot" id="health-mcp"></span>
                        <span>MCP Servers</span>
                    </div>
                </div>
            </div>

            <!-- About -->
            <div class="setting-group setting-about">
                <div class="about-info">
                    <strong>Ank v2.0</strong><br>
                    <span class="text-muted">AI Voice Assistant • Owner: Abhiyank</span><br>
                    <span class="text-muted">LiveKit + Gemini Realtime</span>
                </div>
            </div>
        </div>

        <!-- Save button -->
        <div class="settings-footer">
            <button class="btn-save-settings" onclick="saveSettings()">
                💾 Save Settings
            </button>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main-container">
        <!-- Central orb section -->
        <section class="orb-section">
            <div class="orb-container" id="orb-container">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>

                <svg class="waveform-ring" viewBox="0 0 300 300" id="waveform-svg">
                    <circle cx="150" cy="150" r="120" fill="none" stroke="rgba(0,229,255,0.08)" stroke-width="1"/>
                </svg>

                <div class="orb" id="orb">
                    <div class="orb-inner">
                        <div class="orb-glow"></div>
                        <img src="/maxo_icon.png" alt="Ank" class="orb-avatar" id="orb-avatar">
                    </div>
                </div>

                <div class="audio-bars" id="audio-bars">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div>
                </div>
            </div>

            <p class="orb-status" id="orb-status">Systems Standing By</p>
        </section>

        <!-- Connect / Disconnect button -->
        <section class="controls">
            <button class="btn-connect" id="btn-connect" onclick="toggleConnection()">
                <span class="btn-icon">⚡</span>
                <span class="btn-label">INITIALIZE</span>
            </button>
        </section>

        <!-- Transcription feed -->
        <section class="transcript-section" id="transcript-section">
            <div class="transcript-header">
                <span class="transcript-title">◈ DATA STREAM</span>
                <button class="transcript-clear" onclick="clearTranscript()" title="Clear">✕</button>
            </div>
            <div class="transcript-feed" id="transcript-feed">
                <div class="transcript-empty">Awaiting voice input...</div>
            </div>
        </section>
    </main>

    <!-- Agent control panel (bottom) -->
    <footer class="agent-panel">
        <button class="agent-btn" id="btn-agent-start" onclick="startAgent()">
            <span>▶</span> Start Agent
        </button>
        <button class="agent-btn" id="btn-agent-stop" onclick="stopAgent()" disabled>
            <span>■</span> Stop Agent
        </button>
        <div class="room-info" id="room-info">Room: —</div>
    </footer>

    <!-- LiveKit SDK -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
    <script src="/app.js"></script>
</body>
</html>
